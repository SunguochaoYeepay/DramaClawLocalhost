name: "✨ 功能建议 / Feature Request"
description: "提一个新功能或改进 / Suggest a new feature or improvement"
labels: ["enhancement"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: "前置检查 / Pre-flight checks"
      options:
        - label: "我已搜索过现有 issue 与 Discussions，确认这不是重复 / I searched existing issues and Discussions"
          required: true
  - type: textarea
    id: problem
    attributes:
      label: "要解决的问题 / 场景 / Problem or use case"
      description: "描述动机和使用场景，而不是直接给方案 / Describe the motivation and use case, not the solution"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: "期望的方案 / Proposed solution"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "备选方案 / 补充 / Alternatives & context"
    validations:
      required: false
