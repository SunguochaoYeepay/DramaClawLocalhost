name: frontend

# 前端 CI。与 frontend/Dockerfile 一致：pnpm（packageManager 锁 11.5.0）+ node 22。
# 跑「编译 + 类型检查」(pnpm build = tsc -b && vite build) 与单元测试 (vitest)。
# 仅在前端相关文件变更时触发，避免无关改动空跑。

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm (reads packageManager from package.json)
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Build (tsc typecheck + vite build)
        run: pnpm build
      - name: Unit tests (vitest)
        run: pnpm test
