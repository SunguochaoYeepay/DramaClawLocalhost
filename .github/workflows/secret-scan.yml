name: secret-scan

# SECRET-15：CI secret-scan 门。命中即 exit 1，作为合入前必过门。
# 直接装 gitleaks 二进制运行（不用 gitleaks-action，规避 org 私仓的 license 要求）。

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # 取全历史，供 gitleaks git 扫描

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan full git history
        run: gitleaks git . -c .gitleaks.toml --redact --no-banner --exit-code 1
