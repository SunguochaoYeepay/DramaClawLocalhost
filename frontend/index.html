<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/brand/dclogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DramaClaw</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("supertale-app");
          var theme = "system";
          if (stored) {
            var parsed = JSON.parse(stored);
            if (parsed && parsed.state && parsed.state.theme) {
              theme = parsed.state.theme;
            }
          }
          var resolved =
            theme === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : theme;
          document.documentElement.classList.add(resolved);
          var pathname = window.location.pathname;
          if (pathname === "/login" || pathname.indexOf("/watch/") === 0) {
            document.documentElement.classList.add("preauth-shell");
            document.documentElement.style.backgroundColor = "#181818";
          }
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
